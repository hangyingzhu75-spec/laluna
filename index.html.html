<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LALUNA | Sensual Elegance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            overflow: hidden;
            color: #fff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            touch-action: none;
        }

        .scene {
            perspective: 2000px;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel {
            width: 280px; 
            height: 380px;
            position: relative;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 1.5s ease, transform 0.5s ease;
            cursor: pointer;
        }

        .card img {
            width: 100%;
            height: 84%;
            object-fit: cover;
            border-radius: 2px;
        }

        #detail-panel::-webkit-scrollbar { display: none; }
        #detail-panel { scrollbar-width: none; }

        .reveal-item {
            opacity: 0;
            transform: translateY(40px);
            filter: blur(10px);
            transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .reveal-item.active {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
        }

        .spec-tag {
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #999;
            border-left: 1px solid #ddd;
            padding-left: 12px;
            margin-top: 12px;
        }

        #reset-btn {
            position: absolute;
            bottom: 40px;
            right: 40px;
            padding: 12px 24px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
        }

        #reset-btn:hover { background: #fff; color: #000; }

        .info-panel {
            position: absolute;
            top: 5vh;
            left: 5vw;
            z-index: 50;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h1 class="text-4xl font-bold tracking-tighter mb-2">LALUNA</h1>
        <p class="text-[10px] tracking-[0.4em] opacity-40 uppercase">Sensual but Never Cheap / 2026 Edition</p>
    </div>

    <div class="scene" id="main-scene">
        <div class="carousel" id="carousel"></div>
    </div>

    <div id="detail-panel" class="fixed inset-0 bg-white z-[200] translate-y-full transition-transform duration-700 ease-[cubic-bezier(0.23,1,0.32,1)] overflow-y-auto text-black p-8 md:p-20">
        <button id="close-btn" class="fixed top-10 left-10 text-[10px] tracking-[0.3em] uppercase border-b border-black pb-1 hover:opacity-40 transition-all z-[210]">Close / 关闭</button>
        
        <div class="max-w-5xl mx-auto mt-20">
            <div class="flex flex-col md:flex-row justify-between items-baseline mb-24 border-b border-gray-100 pb-12">
                <h2 id="detail-title" class="text-6xl font-extralight tracking-tighter mb-6 md:mb-0 uppercase">Title</h2>
                <div class="text-[10px] space-y-2 uppercase tracking-[0.2em] opacity-50">
                    <p id="detail-category">Category</p>
                    <p id="detail-year">Spring / 2026</p>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-12 gap-10 mb-32">
                <div class="md:col-span-8">
                    <p id="detail-desc" class="text-sm leading-relaxed text-gray-500 max-w-2xl italic">Description...</p>
                </div>
                <div class="md:col-span-4 text-[9px] uppercase tracking-[0.3em] leading-loose opacity-30 text-right">
                    Eternal Allure<br>Sculpted Silence<br>The Art of Skin
                </div>
            </div>
            
            <div id="detail-images" class="space-y-32"></div>

            <div class="py-24 text-center opacity-10 text-[10px] tracking-[1em] uppercase">LALUNA All Rights Reserved</div>
        </div>
    </div>

    <button id="reset-btn">Reset View / 还原</button>

    <script>
        const carousel = document.getElementById('carousel');
        const resetBtn = document.getElementById('reset-btn');
        const detailPanel = document.getElementById('detail-panel');
        const closeBtn = document.getElementById('close-btn');

        let targetRotationY = 0, currentRotationY = 0;
        let targetRadius = 0, currentRadius = 0;   
        let targetZoom = 0, currentZoom = 0;
        let isDragging = false, startX = 0;

        const defaultRadius = window.innerWidth < 768 ? 240 : 300;

        // 已重新编写 8 个作品的品牌调性文案
        const myWorks = [
            { name: "Midnight", images: ["1", "1_1", "1_2"], title: "Obsidian Silk", category: "Atelier Collection", year: "2026", description: "以午夜黑缎面勾勒身体曲线，追求极致的包裹感与垂坠性。性感不在于裸露，而在于若隐若现的权力感。" },
            { name: "Whisper", images: ["2", "2_1", "2_2"], title: "Sheer Veil", category: "Evening Wear", year: "2026", description: "轻盈透薄的材质搭配利落的剪裁。打破廉价感，用高级质感重新定义感官的极致诱惑。" },
            { name: "Angel", images: ["3", "3_1", "3_2"], title: "Symmetry Breach", category: "Couture Design", year: "2026", description: "低饱和度的素白，通过褶皱捕捉光影，呈现一种原始而纯粹的神性之美。" },
            { name: "Edge", images: ["4", "4_1", "4_2"], title: "Sharp Cut", category: "Ready-to-wear", year: "2026", description: "硬朗线条与柔软内衬的碰撞。专为拥有独立意识、不屑于讨好的女性量身定制。" },
            { name: "Glow", images: ["5", "5_1", "5_2"], title: "Skin Satin", category: "Essentials", year: "2026", description: "如第二层皮肤般的触感，在极简中流露慵懒而高级的吸引力。爱神丘比特本特。" },
            { name: "Envelop", images: ["6", "6_1"], title: "Secret Envelope", category: "Lingerie Inspired", year: "2026", description: "包裹身体的每一寸私密。是青涩与性感的极致碰撞，也是最无声的情话。" },
            { name: "White Choc", images: ["7", "7_1", "7_2"], title: "White Velvet", category: "Resort Collection", year: "2026", description: "白巧克力般的丝滑甜感，却带着一种生人勿近的高冷。高级的甜，从不腻人。" },
            { name: "Amethyst", images: ["8", "8_1"], title: "Royal Purple", category: "Sculptural Form", year: "2026", description: "她说紫色很有韵味。这是一种沉淀在骨子里的、极具张力的成熟魅力。" }
        ];

        const cards = [];

        function init() {
            myWorks.forEach((work, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                const angle = i * (360 / myWorks.length);
                card.innerHTML = `
                    <img src="images/${work.images[0]}.jpg" alt="${work.name}" onerror="this.src='https://via.placeholder.com/600x800/f5f5f5/999999?text=${work.name}'">
                    <div class="flex justify-between items-center mt-4 text-black px-1">
                        <span class="text-[12px] font-black italic">0${i+1}</span>
                        <span class="text-[10px] font-bold tracking-widest uppercase">${work.name}</span>
                    </div>
                `;
                card.addEventListener('click', () => { if (!isDragging) openDetail(work); });
                carousel.appendChild(card);
                cards.push({ el: card, angle: angle });
                setTimeout(() => { card.style.opacity = "1"; targetRadius = defaultRadius; }, 100 * i);
            });
        }

        function openDetail(data) {
            document.getElementById('detail-title').innerText = data.title;
            document.getElementById('detail-category').innerText = `Line / ${data.category}`;
            document.getElementById('detail-year').innerText = `Release / ${data.year}`;
            document.getElementById('detail-desc').innerText = data.description;
            
            const imgContainer = document.getElementById('detail-images');
            let imagesHTML = '';

            data.images.forEach((imgName, index) => {
                // 修改后的高级女装标注逻辑
                const tags = ["Texture Analysis", "Silhouette Study", "Curvature Detail", "Skin Perception"];
                const mockParam = tags[index % tags.length];
                
                if (index % 3 === 0) {
                    imagesHTML += `
                        <div class="reveal-item w-full">
                            <img src="images/${imgName}.jpg" class="w-full h-auto grayscale hover:grayscale-0 transition-all duration-1000" onerror="this.src='https://via.placeholder.com/1200x800/eeeeee/999999?text=Visual+Atmosphere'">
                            <div class="spec-tag">Atmosphere / ${mockParam}</div>
                        </div>`;
                } else if (index % 3 === 1) {
                    imagesHTML += `<div class="flex flex-col md:flex-row gap-16 items-start">`;
                    imagesHTML += `
                        <div class="reveal-item w-full md:w-5/12">
                            <img src="images/${imgName}.jpg" class="w-full h-auto" onerror="this.src='https://via.placeholder.com/600x800/eeeeee/999999?text=Detail'">
                            <div class="spec-tag">Detail / Material Touch</div>
                        </div>`;
                    if (index === data.images.length - 1) imagesHTML += `</div>`;
                } else {
                    imagesHTML += `
                        <div class="reveal-item w-full md:w-7/12 mt-20 md:mt-40">
                            <img src="images/${imgName}.jpg" class="w-full h-auto" onerror="this.src='https://via.placeholder.com/800x600/eeeeee/999999?text=Silhouette'">
                            <div class="spec-tag text-right">Sensory Study / ${mockParam}</div>
                        </div>`;
                    imagesHTML += `</div>`;
                }
            });

            imgContainer.innerHTML = imagesHTML;
            initScrollReveal();
            detailPanel.classList.remove('translate-y-full');
        }

        function initScrollReveal() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal-item').forEach(el => observer.observe(el));
        }

        closeBtn.addEventListener('click', () => { detailPanel.classList.add('translate-y-full'); });

        function animate() {
            currentRotationY += (targetRotationY - currentRotationY) * 0.08;
            currentRadius += (targetRadius - currentRadius) * 0.08;
            currentZoom += (targetZoom - currentZoom) * 0.08;
            carousel.style.transform = `rotateY(${currentRotationY}deg) translateZ(${currentZoom}px)`;
            cards.forEach(card => {
                card.el.style.transform = `rotateY(${card.angle}deg) translateZ(${currentRadius}px)`;
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('wheel', (e) => {
            if (!detailPanel.classList.contains('translate-y-full')) return;
            if (e.shiftKey) { targetRadius = Math.max(0, Math.min(1000, targetRadius - e.deltaY * 0.5)); }
            else if (e.altKey) { targetZoom -= e.deltaY * 1.5; }
            else { targetRotationY -= e.deltaY * 0.1; }
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('mousedown', (e) => { isDragging = false; startX = e.pageX; });
        window.addEventListener('mousemove', (e) => {
            if (Math.abs(e.pageX - startX) > 5) isDragging = true;
            if (isDragging) { targetRotationY += (e.pageX - startX) * 0.2; startX = e.pageX; }
        });

        resetBtn.addEventListener('click', () => { targetRotationY = 0; targetZoom = 0; targetRadius = defaultRadius; });

        init();
        animate();
    </script>
</body>
</html>
